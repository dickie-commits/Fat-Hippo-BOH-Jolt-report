<style>
  :root{ color-scheme: light; }

  :root{

    --panel:#161616;
    --panel-alt:#1e1e1e;
    --panel-border:#2b2b2b;
    --mint:#2fe6a6;
    --mint-dim:rgba(47,230,166,0.14);
    --text:#f4f4f4;
    --text-dim:#9c9c9c;
    --red:#ff6161;
    --red-dim:rgba(255,97,97,0.14);
    --amber:#ffb84d;
    --amber-dim:rgba(255,184,77,0.14);
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;padding:0;
    background:var(--bg);
    color:var(--text);
    font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
    font-size:13px;
    line-height:1.5;
  }

  #app{
    min-height:100vh;
    background:
      radial-gradient(ellipse 900px 300px at 15% -10%, rgba(47,230,166,0.08), transparent 60%),
      var(--bg);
    padding-bottom:60px;
  }

  header{
    display:flex;
    align-items:center;
    gap:18px;
    padding:22px 28px 18px 28px;
    border-bottom:1px solid var(--panel-border);
    flex-wrap:wrap;
  }

  .logo-mark{ flex-shrink:0; }

  .title-block{ flex:1; min-width:260px; }

  h1.brand{
    font-family: Arial, "Helvetica Neue", sans-serif;
    font-weight:900;
    letter-spacing:0.5px;
    font-size:30px;
    margin:0;
    color:#fff;
    text-transform:uppercase;
    text-shadow: 1px 1px 0 rgba(47,230,166,0.35), -1px -1px 0 rgba(255,255,255,0.05);
  }

  .subtitle{
    margin-top:4px;
    color:var(--mint);
    font-size:13px;
    letter-spacing:0.5px;
  }

  .subtitle .muted{ color:var(--text-dim); }

  .status-pill{
    margin-left:auto;
    font-size:11px;
    color:var(--text-dim);
    border:1px solid var(--panel-border);
    border-radius:20px;
    padding:6px 14px;
    background:var(--panel);
    white-space:nowrap;
  }

  .status-pill.live::before{
    content:"";
    display:inline-block;
    width:7px;height:7px;
    border-radius:50%;
    background:var(--mint);
    margin-right:7px;
    box-shadow:0 0 6px var(--mint);
  }

  nav#tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:14px 28px;
    border-bottom:1px solid var(--panel-border);
    background:#0d0d0d;
    scrollbar-width:thin;
  }
  nav#tabs::-webkit-scrollbar{height:6px;}
  nav#tabs::-webkit-scrollbar-thumb{background:var(--panel-border); border-radius:4px;}

  .tab-btn{
    flex-shrink:0;
    background:var(--panel);
    color:var(--text-dim);
    border:1px solid var(--panel-border);
    border-radius:8px;
    padding:8px 16px;
    font-family:inherit;
    font-size:12px;
    letter-spacing:0.4px;
    text-transform:uppercase;
    cursor:pointer;
    transition:all .15s ease;
  }
  .tab-btn:hover{ color:#fff; border-color:var(--mint); }
  .tab-btn.active{
    background:var(--mint-dim);
    color:var(--mint);
    border-color:var(--mint);
    font-weight:700;
  }
  .tab-btn.group-tab{ font-weight:700; }

  .tab-btn{ display:flex; align-items:center; gap:6px; text-transform:none; }
  .tab-btn .tab-label{ text-transform:uppercase; }
  .tab-badges{ display:flex; gap:4px; }
  .tab-badge{
    display:inline-flex; align-items:center; justify-content:center;
    min-width:16px; height:16px; padding:0 4px;
    border-radius:8px; font-size:9.5px; font-weight:700;
    font-family:"SFMono-Regular", Menlo, Consolas, monospace;
    letter-spacing:0;
  }
  .tab-badge.incomplete{ background:rgba(255,184,77,0.18); color:var(--amber); border:1px solid rgba(255,184,77,0.4); }
  .tab-badge.flags{ background:rgba(255,97,97,0.18); color:var(--red); border:1px solid rgba(255,97,97,0.4); }
  .tab-badge.zero{ background:rgba(47,230,166,0.12); color:var(--mint); border:1px solid rgba(47,230,166,0.35); }

  main{ padding:26px 28px; }

  .panel{ display:none; animation:fadein .2s ease; }
  .panel.active{ display:block; }
  @keyframes fadein{ from{opacity:0;} to{opacity:1;} }

  .section{ margin-bottom:30px; }

  .section-title{
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .section-title::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--panel-border);
  }

  .section-subtitle{
    font-size:11px;
    color:var(--text-dim);
    margin:-6px 0 12px 0;
  }

  .card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
    gap:12px;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:10px;
    padding:16px 18px;
  }

  .card .label{
    font-size:10.5px;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:0.6px;
    margin-bottom:8px;
  }

  .card .value{
    font-size:22px;
    font-weight:700;
    color:#fff;
  }
  .card .value.mint{ color:var(--mint); }
  .card .value.red{ color:var(--red); }
  .card .value.amber{ color:var(--amber); }

  .card .sub{
    margin-top:6px;
    font-size:11.5px;
    color:var(--text-dim);
  }

  .card.rag-good{
    border-color:rgba(47,230,166,0.55);
    background:linear-gradient(180deg, rgba(47,230,166,0.10), var(--panel) 70%);
  }
  .card.rag-good .value{ color:var(--mint); }

  .card.rag-bad{
    border-color:rgba(255,97,97,0.6);
    background:linear-gradient(180deg, rgba(255,97,97,0.10), var(--panel) 70%);
  }
  .card.rag-bad .value{ color:var(--red); }

  .site-row{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:10px;
    padding:12px 16px;
    margin-bottom:8px;
  }
  .site-row .site-name{ flex:0 0 220px; font-weight:600; color:#fff; font-size:12.5px; }
  .site-row .bar-track{
    flex:1;
    height:8px;
    border-radius:5px;
    background:#232323;
    overflow:hidden;
    min-width:80px;
  }
  .site-row .bar-fill{ height:100%; border-radius:5px; }
  .site-row .bar-fill.good{ background:var(--mint); }
  .site-row .bar-fill.bad{ background:var(--red); }
  .site-row .pct-val{ flex:0 0 60px; text-align:right; font-weight:700; font-size:13px; }
  .site-row .pct-val.good{ color:var(--mint); }
  .site-row .pct-val.bad{ color:var(--red); }
  .site-row .meta{ flex:0 0 120px; text-align:right; color:var(--text-dim); font-size:10.5px; }
  .target-line-note{ font-size:10.5px; color:var(--text-dim); margin:8px 2px 0 2px; }

  table.gh{
    width:100%;
    border-collapse:collapse;
    font-size:12px;
  }
  table.gh th{
    text-align:left;
    color:var(--text-dim);
    font-weight:600;
    text-transform:uppercase;
    font-size:10px;
    letter-spacing:0.5px;
    padding:8px 10px;
    border-bottom:1px solid var(--panel-border);
  }
  table.gh td{
    padding:9px 10px;
    border-bottom:1px solid #1c1c1c;
    color:var(--text);
  }
  table.gh tbody tr:hover{ background:#191919; }
  table.gh td.num{ text-align:right; font-variant-numeric:tabular-nums; }

  .summary-box{
    background:linear-gradient(135deg, rgba(47,230,166,0.07), rgba(47,230,166,0.01));
    border:1px solid var(--mint);
    border-radius:10px;
    padding:18px 20px;
    font-size:13px;
    line-height:1.7;
    color:#e9e9e9;
  }
  .summary-box b{ color:var(--mint); }
  .summary-box.bad{ border-color: var(--red); background:linear-gradient(135deg, rgba(255,97,97,0.08), rgba(255,97,97,0.01)); }

  .focus-card{
    background:var(--panel);
    border:1px solid rgba(255,97,97,0.5);
    border-left:3px solid var(--red);
    border-radius:8px;
    padding:12px 16px;
    margin-bottom:10px;
  }
  .focus-card .fc-head{
    display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
  }
  .focus-card .fc-site{ font-weight:700; color:#fff; font-size:13px; }
  .focus-card .fc-gap{ color:var(--red); font-size:12px; font-weight:700; }
  .focus-card ul{ margin:4px 0 0 0; padding-left:18px; color:var(--text-dim); font-size:12px; }
  .focus-card li{ margin-bottom:3px; }

  .flag-row{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:10px;
    padding:12px 16px;
    margin-bottom:8px;
  }
  .flag-row.critical{ border-color:rgba(255,97,97,0.55); background:linear-gradient(180deg, rgba(255,97,97,0.08), var(--panel) 60%); }
  .flag-row.warning{ border-color:rgba(255,184,77,0.5); background:linear-gradient(180deg, rgba(255,184,77,0.07), var(--panel) 60%); }
  .flag-meta{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; font-size:11px; color:var(--text-dim); margin-bottom:6px; }
  .flag-meta b{ color:#fff; }
  .sev-badge{
    display:inline-block; font-size:9.5px; text-transform:uppercase; letter-spacing:0.5px;
    padding:2px 8px; border-radius:20px; border:1px solid var(--panel-border); color:var(--text-dim);
  }
  .sev-badge.critical{ color:var(--red); border-color:rgba(255,97,97,0.5); }
  .sev-badge.warning{ color:var(--amber); border-color:rgba(255,184,77,0.5); }
  .flag-text{ font-size:12.5px; color:#e9e9e9; line-height:1.5; }

  .no-data{ color:var(--text-dim); font-style:italic; padding:12px 4px; }

  .rag-pill{
    display:inline-block; padding:2px 9px; border-radius:20px; font-weight:700; font-size:12px;
    font-variant-numeric:tabular-nums;
  }
  .rag-pill.good{ background:rgba(47,230,166,0.16); color:var(--mint); border:1px solid rgba(47,230,166,0.4); }
  .rag-pill.amber{ background:rgba(255,184,77,0.16); color:var(--amber); border:1px solid rgba(255,184,77,0.4); }
  .rag-pill.bad{ background:rgba(255,97,97,0.16); color:var(--red); border:1px solid rgba(255,97,97,0.4); }
  .rag-pill.none{ background:transparent; color:var(--text-dim); border:1px solid var(--panel-border); }

  .rag-key{ display:flex; gap:16px; flex-wrap:wrap; font-size:11px; color:var(--text-dim); margin:8px 2px 0 2px; align-items:center; }
  .rag-key .swatch{ display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; vertical-align:middle; }
  .rag-key .swatch.good{ background:var(--mint); }
  .rag-key .swatch.amber{ background:var(--amber); }
  .rag-key .swatch.bad{ background:var(--red); }

  .num-highlight{ font-weight:700; }
  .num-highlight.amber{ color:var(--amber); }
  .num-highlight.red{ color:var(--red); }
  .num-highlight.mint{ color:var(--mint); }

  .day-section-header{
    font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px;
    color:var(--mint); margin:18px 0 8px 0; padding-bottom:4px;
    border-bottom:1px solid var(--panel-border);
  }
  .day-section-header:first-child{ margin-top:0; }

  .day-grid{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:10px;
  }
  .day-card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:10px;
    padding:12px 10px;
    text-align:center;
  }
  .day-card.good{ border-color:rgba(47,230,166,0.5); background:linear-gradient(180deg, rgba(47,230,166,0.09), var(--panel) 70%); }
  .day-card.amber{ border-color:rgba(255,184,77,0.5); background:linear-gradient(180deg, rgba(255,184,77,0.08), var(--panel) 70%); }
  .day-card.bad{ border-color:rgba(255,97,97,0.55); background:linear-gradient(180deg, rgba(255,97,97,0.09), var(--panel) 70%); }
  .day-card .day-name{ font-size:10.5px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-dim); }
  .day-card .day-date{ font-size:10px; color:var(--text-dim); margin-bottom:8px; }
  .day-card .day-pct{ font-size:19px; font-weight:700; color:#fff; }
  .day-card.good .day-pct{ color:var(--mint); }
  .day-card.amber .day-pct{ color:var(--amber); }
  .day-card.bad .day-pct{ color:var(--red); }
  .day-card .day-meta{ font-size:10px; color:var(--text-dim); margin-top:6px; line-height:1.5; }
  .day-card .day-meta b{ color:#e9e9e9; }
  @media (max-width: 720px){ .day-grid{ grid-template-columns:repeat(auto-fit, minmax(90px,1fr)); } }

  .chart-wrap{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:10px;
    padding:16px 18px;
    height:220px;
    position:relative;
  }

  .info-box{
    background:var(--panel-alt);
    border:1px dashed var(--panel-border);
    border-radius:10px;
    padding:16px 18px;
    display:flex;
    gap:12px;
    align-items:flex-start;
    font-size:12px;
    color:var(--text-dim);
  }
  .info-box .dot{
    flex-shrink:0;
    width:20px;height:20px;
    border-radius:50%;
    background:var(--mint);
    color:#00251a;
    font-weight:900;
    font-size:12px;
    display:flex;align-items:center;justify-content:center;
    margin-top:1px;
  }

  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:#2b2b2b; border-radius:4px; }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/gridjs.umd.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/theme/mermaid.min.css">

<script>
(function(){

  const DATA = JSON.parse(document.getElementById('jolt-data').textContent);
  const TARGET = DATA.meta.target_pct;

  function fmtPct(n, dp){
    dp = dp==null?1:dp;
    return (n===null||n===undefined||isNaN(n)) ? 'n/a' : n.toFixed(dp)+'%';
  }
  function ragOf(pct){
    if (pct===null||pct===undefined) return '';
    return pct >= TARGET ? 'good' : 'bad';
  }
  function ragTier3(pct){
    if (pct===null||pct===undefined) return 'none';
    if (pct >= TARGET) return 'good';
    if (pct >= 85) return 'amber';
    return 'bad';
  }
  // Highlights a count (incomplete lists / data-quality flags) the same way the overall
  // completion cards are highlighted: coloured when it represents a problem, mint when clear.
  function countHtml(n, colorWhenPositive){
    const cls = n > 0 ? colorWhenPositive : 'mint';
    return '<span class="num-highlight '+cls+'">'+n+'</span>';
  }
  function escapeHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function safeId(s){ return String(s).replace(/[^a-z0-9]/gi,'_'); }

  document.getElementById('week-subtitle').innerHTML =
    'Week of <b>'+DATA.meta.latest_week_label+'</b> &mdash; <span class="muted">HACCP daily compliance checklists &middot; target '+TARGET+'%</span>';
  document.getElementById('status-pill').textContent = 'Jolt CSV export · generated '+DATA.meta.generated;

  // ---------------- build tab list: Group + each site ----------------
  const siteNames = DATA.meta.site_names;
  const tabs = [{ key:'__group__', label:'Group', isGroup:true }].concat(
    siteNames.map(n => ({ key:n, label:n.replace(/^Fat Hippo /,''), isGroup:false }))
  );

  const tabsEl = document.getElementById('tabs');
  const content = document.getElementById('content');
  tabsEl.innerHTML = '';
  tabs.forEach((t,i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (t.isGroup?' group-tab':'') + (i===0?' active':'');
    btn.dataset.idx = i;
    btn.addEventListener('click', () => activateTab(i));

    const labelSpan = document.createElement('span');
    labelSpan.className = 'tab-label';
    labelSpan.textContent = t.label;
    btn.appendChild(labelSpan);

    if (!t.isGroup){
      const s = DATA.sites[t.key];
      if (s){
        const badges = document.createElement('span');
        badges.className = 'tab-badges';
        const incCount = s.incomplete_lists.length;
        const flagCount = s.compliance_flags.length;
        badges.innerHTML =
          '<span class="tab-badge '+(incCount? 'incomplete':'zero')+'" title="Incomplete lists">'+incCount+'</span>'
          + '<span class="tab-badge '+(flagCount? 'flags':'zero')+'" title="Data quality flags">'+flagCount+'</span>';
        btn.appendChild(badges);
      }
    }
    tabsEl.appendChild(btn);
  });

  content.innerHTML = '';
  tabs.forEach((t,i) => {
    const panel = document.createElement('div');
    panel.className = 'panel' + (i===0?' active':'');
    panel.id = 'panel-'+i;
    panel.innerHTML = t.isGroup ? renderGroupPanel() : renderSitePanel(t.key);
    content.appendChild(panel);
  });

  let rendered = {};
  function activateTab(i){
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', Number(b.dataset.idx)===i));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-'+i).classList.add('active');
    initExtrasFor(i);
  }
  initExtrasFor(0);

  function initExtrasFor(i){
    if (rendered[i]) return;
    rendered[i] = true;
    const t = tabs[i];
    if (t.isGroup){
      renderGroupTable();
      renderGroupChart();
    } else {
      renderSiteChart(t.key);
      renderIssuesChart(t.key);
      renderListTable(t.key);
      renderIncompleteTable(t.key);
    }
  }

  // ==================== GROUP PANEL ====================
  function renderGroupPanel(){
    const g = DATA.group;
    const fm = g.flag_metrics || {total:0, critical:0, warning:0, top_sites:[]};
    const rag = ragOf(g.overall_pct);
    let html = '';

    html += '<div class="section"><div class="section-title">Group Completion &mdash; '+DATA.meta.latest_week_label+'</div>';
    html += '<div class="card-grid">';
    html += '<div class="card '+(rag?'rag-'+rag:'')+'"><div class="label">Overall Group Completion</div><div class="value">'+fmtPct(g.overall_pct)+'</div>'
      + '<div class="sub">Target &ge; '+TARGET+'%</div></div>';
    const above = g.sites.filter(s=>s.pct!=null && s.pct>=TARGET).length;
    const below = g.sites.filter(s=>s.pct!=null && s.pct<TARGET).length;
    html += '<div class="card rag-good"><div class="label">Sites At/Above Target</div><div class="value">'+above+' / '+g.sites.length+'</div></div>';
    html += '<div class="card '+(below>0?'rag-bad':'')+'"><div class="label">Sites Below Target</div><div class="value">'+below+' / '+g.sites.length+'</div></div>';
    const totalMissed = g.sites.reduce((a,s)=>a+(s.missed_count||0),0);
    html += '<div class="card"><div class="label">Incomplete Checklists (this week)</div><div class="value">'+countHtml(totalMissed,'amber')+'</div></div>';
    html += '</div></div>';

    html += '<div class="section"><div class="section-title">Data Quality &mdash; Compliance Flags ('+DATA.meta.latest_week_label+')</div>';
    html += '<div class="section-subtitle">Automated review of Item Result entries for the latest week only — see each site page for full detail. The week-on-week trend is on each site\'s page.</div>';
    html += '<div class="card-grid">';
    html += '<div class="card '+(fm.total?'rag-bad':'rag-good')+'"><div class="label">Total Flags Raised</div><div class="value">'+countHtml(fm.total,'red')+'</div></div>';
    html += '<div class="card '+(fm.critical?'rag-bad':'')+'"><div class="label">Critical</div><div class="value">'+countHtml(fm.critical,'red')+'</div><div class="sub">Impossible readings / implausible speed</div></div>';
    html += '<div class="card"><div class="label">Warning</div><div class="value">'+countHtml(fm.warning,'amber')+'</div><div class="sub">Out-of-range, repeated or stale readings</div></div>';
    html += '</div>';
    if (fm.top_sites && fm.top_sites.length){
      html += '<div style="margin-top:12px;" class="section-subtitle">Sites with the most flags: '
        + fm.top_sites.filter(t=>t.count>0).map(t=>escapeHtml(t.site.replace(/^Fat Hippo /,''))+' ('+t.count+')').join(', ') + '.</div>';
    }
    html += '</div>';

    html += '<div class="section"><div class="section-title">Group Completion &mdash; Week on Week</div>';
    html += '<div class="chart-wrap"><canvas id="group-chart"></canvas></div></div>';

    html += '<div class="section"><div class="section-title">Site Completion &mdash; '+DATA.meta.latest_week_label+'</div>';
    g.sites.forEach(s => {
      const r = ragOf(s.pct);
      const w = s.pct==null ? 0 : Math.max(2, Math.min(100, s.pct));
      html += '<div class="site-row">'
        + '<div class="site-name">'+escapeHtml(s.name)+'</div>'
        + '<div class="bar-track"><div class="bar-fill '+(r||'bad')+'" style="width:'+w+'%;"></div></div>'
        + '<div class="pct-val '+(r||'')+'">'+fmtPct(s.pct)+'</div>'
        + '<div class="meta">'+countHtml(s.missed_count,'amber')+' incomplete &middot; '+countHtml(s.flag_count,'red')+' flags</div>'
        + '</div>';
    });
    html += '<div class="target-line-note">Target line: '+TARGET+'% completion at all times. Sites shown worst-to-best.</div>';
    html += '</div>';

    html += '<div class="section"><div class="section-title">All Sites &mdash; Overview Table</div><div id="group-table"></div></div>';

    html += '<div class="section"><div class="section-title">Focus For Next Week &mdash; Sites Below Target</div>';
    if (g.focus_summary.length){
      html += '<div class="summary-box bad">';
      g.focus_summary.forEach(f => {
        html += '<div class="focus-card"><div class="fc-head"><span class="fc-site">'+escapeHtml(f.site)+' &mdash; '+fmtPct(f.pct)+'</span>'
          + '<span class="fc-gap">'+f.gap.toFixed(1)+' pts below target</span></div>'
          + '<ul>' + f.reasons.map(r=>'<li>'+escapeHtml(r)+'</li>').join('') + '</ul></div>';
      });
      html += '</div>';
    } else {
      html += '<div class="summary-box">Every site met or exceeded the '+TARGET+'% completion target this week &mdash; no focus areas to flag.</div>';
    }
    html += '</div>';

    return html;
  }

  function ragPillHtml(pct){
    return '<span class="rag-pill '+ragTier3(pct)+'">'+fmtPct(pct)+'</span>';
  }

  function renderGroupTable(){
    const el = document.getElementById('group-table');
    if (!el || !window.gridjs) return;
    const rows = DATA.group.sites.map(s => [
      s.name, s.pct, (s.pct!=null && s.pct>=TARGET)?'✓ On target':'⚑ Below target', s.submissions, s.missed_count, s.flag_count
    ]);
    new gridjs.Grid({
      columns: [
        'Site',
        { name:'Completion %', formatter: (cell) => gridjs.html(ragPillHtml(cell)) },
        'Status','Checklists Due',
        { name:'Incomplete', formatter: (cell) => gridjs.html(countHtml(cell,'amber')) },
        { name:'Data Flags', formatter: (cell) => gridjs.html(countHtml(cell,'red')) }
      ],
      data: rows, sort:true, search:true,
      style: {
        table: { 'font-family':'inherit', 'font-size':'12px', background:'#161616', color:'#f4f4f4' },
        th: { background:'#1e1e1e', color:'#9c9c9c', border:'1px solid #2b2b2b' },
        td: { background:'#161616', border:'1px solid #1c1c1c' }
      }
    }).render(el);
  }

  function renderGroupChart(){
    const el = document.getElementById('group-chart');
    if (!el || !window.Chart) return;
    const trend = DATA.group.weekly_trend;
    new Chart(el.getContext('2d'), {
      type:'line',
      data:{
        labels: trend.map(t=>t.label),
        datasets:[
          { label:'Group Completion %', data: trend.map(t=>t.pct), borderColor:'#2fe6a6', backgroundColor:'rgba(47,230,166,0.15)', fill:true, tension:0.25, pointRadius:4 },
          { label:'Target', data: trend.map(()=>TARGET), borderColor:'#ff6161', borderDash:[6,4], pointRadius:0 }
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        scales:{
          y:{ suggestedMin:80, suggestedMax:100, ticks:{color:'#9c9c9c'}, grid:{color:'#2b2b2b'} },
          x:{ ticks:{color:'#9c9c9c'}, grid:{color:'#1c1c1c'} }
        },
        plugins:{ legend:{ labels:{ color:'#e9e9e9' } } }
      }
    });
  }

  // ==================== SITE PANEL ====================
  function renderSitePanel(name){
    const s = DATA.sites[name];
    if (!s) return '<div class="no-data">No data for this site.</div>';
    const rag = ragOf(s.overall_pct);
    let html = '';

    html += '<div class="section"><div class="section-title">Overall Site Completion &mdash; '+DATA.meta.latest_week_label+'</div>';
    html += '<div class="card-grid">';
    html += '<div class="card '+(rag?'rag-'+rag:'')+'"><div class="label">Overall Completion Rate</div><div class="value">'+fmtPct(s.overall_pct)+'</div>'
      + '<div class="sub">Target &ge; '+TARGET+'%</div></div>';
    html += '<div class="card"><div class="label">Incomplete Checklists</div><div class="value">'+countHtml(s.incomplete_lists.length,'amber')+'</div></div>';
    html += '<div class="card"><div class="label">Data-Quality Flags</div><div class="value">'+countHtml(s.compliance_flags.length,'red')+'</div></div>';
    html += '</div></div>';

    html += '<div class="section"><div class="section-title">What This Page Is Highlighting</div>';
    html += '<div class="summary-box'+(rag==='bad'?' bad':'')+'">'+s.summary_html+'</div></div>';

    html += '<div class="section"><div class="section-title">Daily Completion &mdash; Mon to Sun ('+DATA.meta.latest_week_label+')</div>';
    html += '<div class="day-grid">';
    (s.daily_breakdown||[]).forEach(d => {
      const cls = d.rag || 'none';
      html += '<div class="day-card '+cls+'">'
        + '<div class="day-name">'+d.day_label+'</div>'
        + '<div class="day-date">'+d.date_label+'</div>'
        + '<div class="day-pct">'+(d.pct==null?'&mdash;':fmtPct(d.pct))+'</div>'
        + '<div class="day-meta">'+countHtml(d.incomplete_count,'amber')+' incomplete<br>'+countHtml(d.flag_count,'red')+' flags</div>'
        + '</div>';
    });
    html += '</div>';
    html += '<div class="rag-key"><span><span class="swatch good"></span>&ge; 96%</span><span><span class="swatch amber"></span>85&ndash;95.9%</span><span><span class="swatch bad"></span>&lt; 85%</span></div>';
    html += '</div>';

    html += '<div class="section"><div class="section-title">Running Completion Total &mdash; Week on Week</div>';
    html += '<div class="chart-wrap"><canvas id="chart-'+safeId(name)+'"></canvas></div></div>';

    html += '<div class="section"><div class="section-title">Incomplete Checklists &amp; Data Quality Flags &mdash; Week on Week</div>';
    html += '<div class="chart-wrap"><canvas id="issues-chart-'+safeId(name)+'"></canvas></div></div>';

    html += '<div class="section"><div class="section-title">Completion by List Name ('+DATA.meta.latest_week_label+')</div>';
    html += '<div id="list-table-'+safeId(name)+'"></div></div>';

    html += '<div class="section"><div class="section-title">Lists Not Completed ('+DATA.meta.latest_week_label+')</div>';
    html += '<div id="incomplete-table-'+safeId(name)+'"></div></div>';

    html += '<div class="section"><div class="section-title">Compliance Checks &mdash; Data Quality Review ('+DATA.meta.latest_week_label+')</div>';
    html += '<div class="section-subtitle">Automated review of Item Result entries for signs of false or unreliable data: impossible or out-of-range temperature readings, temperature checklists completed in under 1:20, the Weekly Audit Check completed in under 2:30, identical readings repeated by the same user, and Cooling Record items with no valid temperature logged in over 5 days. Note: Jolt only logs completion times to the minute, so timing flags show the best available range rather than an exact second count.</div>';
    if (s.compliance_flags.length){
      let lastDay = null;
      s.compliance_flags.forEach(f => {
        const dayKey = f.date || 'Undated';
        if (dayKey !== lastDay){
          html += '<div class="day-section-header">'+escapeHtml(dayKey)+'</div>';
          lastDay = dayKey;
        }
        html += '<div class="flag-row '+f.severity+'"><div class="flag-meta">'
          + '<span class="sev-badge '+f.severity+'">'+f.severity+'</span>'
          + '<b>'+escapeHtml(f.list_name)+'</b>'
          + (f.completed_by ? '<span>'+escapeHtml(f.completed_by)+'</span>' : '')
          + '</div><div class="flag-text">'+escapeHtml(f.reason)+'</div></div>';
      });
    } else {
      html += '<div class="no-data">No data-quality concerns flagged for this site.</div>';
    }
    html += '</div>';

    return html;
  }

  function renderSiteChart(name){
    const s = DATA.sites[name];
    const el = document.getElementById('chart-'+safeId(name));
    if (!el || !window.Chart || !s) return;
    const trend = s.weekly_trend;
    new Chart(el.getContext('2d'), {
      type:'line',
      data:{
        labels: trend.map(t=>t.label),
        datasets:[
          { label:name.replace(/^Fat Hippo /,'')+' Completion %', data: trend.map(t=>t.pct), borderColor:'#2fe6a6', backgroundColor:'rgba(47,230,166,0.15)', fill:true, tension:0.25, pointRadius:4 },
          { label:'Target', data: trend.map(()=>TARGET), borderColor:'#ff6161', borderDash:[6,4], pointRadius:0 }
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        scales:{
          y:{ suggestedMin:70, suggestedMax:100, ticks:{color:'#9c9c9c'}, grid:{color:'#2b2b2b'} },
          x:{ ticks:{color:'#9c9c9c'}, grid:{color:'#1c1c1c'} }
        },
        plugins:{ legend:{ labels:{ color:'#e9e9e9' } } }
      }
    });
  }

  function renderIssuesChart(name){
    const s = DATA.sites[name];
    const el = document.getElementById('issues-chart-'+safeId(name));
    if (!el || !window.Chart || !s) return;
    const trend = s.weekly_trend;
    new Chart(el.getContext('2d'), {
      type:'line',
      data:{
        labels: trend.map(t=>t.label),
        datasets:[
          { label:'Incomplete Checklists', data: trend.map(t=>t.incomplete_count), borderColor:'#ffb84d', backgroundColor:'rgba(255,184,77,0.15)', fill:true, tension:0.25, pointRadius:4 },
          { label:'Data Quality Flags', data: trend.map(t=>t.flag_count), borderColor:'#ff6161', backgroundColor:'rgba(255,97,97,0.12)', fill:true, tension:0.25, pointRadius:4 }
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        scales:{
          y:{ beginAtZero:true, ticks:{color:'#9c9c9c', precision:0}, grid:{color:'#2b2b2b'} },
          x:{ ticks:{color:'#9c9c9c'}, grid:{color:'#1c1c1c'} }
        },
        plugins:{ legend:{ labels:{ color:'#e9e9e9' } } }
      }
    });
  }

  function renderListTable(name){
    const s = DATA.sites[name];
    const el = document.getElementById('list-table-'+safeId(name));
    if (!el || !window.gridjs || !s) return;
    const rows = s.list_breakdown.map(l => [
      l.list_name, l.pct, (l.pct!=null && l.pct>=TARGET)?'✓':'⚑', l.submissions, l.missed_count, l.flag_count
    ]);
    new gridjs.Grid({
      columns: [
        'List Name',
        { name:'Completion %', formatter: (cell) => gridjs.html(ragPillHtml(cell)) },
        'Status','Submissions',
        { name:'Missed', formatter: (cell) => gridjs.html(countHtml(cell,'amber')) },
        { name:'Data Flags', formatter: (cell) => gridjs.html(countHtml(cell,'red')) }
      ],
      data: rows, sort:true, search:true,
      style: {
        table: { 'font-family':'inherit', 'font-size':'12px', background:'#161616', color:'#f4f4f4' },
        th: { background:'#1e1e1e', color:'#9c9c9c', border:'1px solid #2b2b2b' },
        td: { background:'#161616', border:'1px solid #1c1c1c' }
      }
    }).render(el);
  }

  function renderIncompleteTable(name){
    const s = DATA.sites[name];
    const el = document.getElementById('incomplete-table-'+safeId(name));
    if (!el || !s) return;
    if (!s.incomplete_lists.length){
      el.innerHTML = '<div class="no-data">All checklists were completed in full for this site.</div>';
      return;
    }
    if (!window.gridjs) return;
    const rows = s.incomplete_lists.map(l => [
      l.list_name, l.date, l.status, fmtPct(l.pct), l.missing_items, l.display_time, l.deadline, l.submit_time
    ]);
    new gridjs.Grid({
      columns: ['List Name','Date','Status','Completion %','Missing Items','Display Window','Deadline','Submitted'],
      data: rows, sort:true, search:true,
      style: {
        table: { 'font-family':'inherit', 'font-size':'12px', background:'#161616', color:'#f4f4f4' },
        th: { background:'#1e1e1e', color:'#9c9c9c', border:'1px solid #2b2b2b' },
        td: { background:'#161616', border:'1px solid #1c1c1c' }
      }
    }).render(el);
  }

})();
</script>
</body>
</html>
